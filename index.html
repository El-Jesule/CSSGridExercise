<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Grid Exercise  </title>
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <section class="gallery">
    <h1 class="gridTitle">Cachorros de perro</h1>
    <img class="gridImg1" src="img/image1.jpg" alt="Cachorro de pelaje claro tumbado sobre un cojín con estampado de hojas verdes, con la boca abierta y lengua visible">
    <img class="gridImg2" src="img/image2.jpg" alt="Dos cachorros negros en el césped. Uno está tumbado mirando al frente mientras el otro le acerca el hocico a la cara">
    <img class="gridImg3" src="img/image3.jpg" alt="Tres cachorros de pelaje claro sentados en fila sobre el césped frente a una pared de madera">
    <img class="gridImg4" src="img/image10.jpg" alt="Cachorro marrón con collar rojo de pie en el césped junto a un neumático">
    <img class="gridImg5" src="img/image5.jpg" alt="Grupo numeroso de cachorros dorados apretujados juntos sobre una superficie azul">
    <img class="gridImg6" src="img/image6.jpg" alt="Varios cachorros juntos. Uno negro con pecho blanco mira al frente, rodeado de otros cachorros negros y marrones">
    <img class="gridImg7" src="img/image7.jpg" alt="Dos cachorros recién nacidos blanco y negro durmiendo juntos sobre una manta">
    <img class="gridImg8" src="img/image8.jpg" alt="Cachorro marrón claro con ojos azules sentado sobre un lecho de paja">
    <img class="gridImg9" src="img/image9.jpg" alt="Cachorro negro con manchas marrones tumbado en el suelo mirando hacia arriba">
    <img class="gridImg10" src="img/image4.jpg" alt="Cachorros jugando en el césped. Un cachorro negro se yergue sobre las patas traseras frente a un cachorro marrón tumbado">
  </section>
</body>
</html>
